workflows:
  ios-build:
    name: Subtitle Studio iOS Build
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hmyilm.SubtitleStudio
    integrations:
      app_store_connect: Codemagic2
    scripts:
      - name: Generate Xcode Project
        script: |
          brew install xcodegen
          xcodegen generate
      - name: Install Dependencies
        script: |
          pod install
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files "com.hmyilm.SubtitleStudio" --type IOS_APP_STORE --create
          xcode-project use-profiles
      - name: Build App for TestFlight
        script: |
          xcode-project build-ipa --workspace SubtitleStudio.xcworkspace --scheme SubtitleStudio
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
