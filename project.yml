name: SubByAudiocraft
options:
  bundleIdPrefix: com.hmyilm
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.7.2
targets:
  SubByAudiocraft:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    version: 1.3.4
    build: 25
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.hmyilm.SubByAudiocraft
      MARKETING_VERSION: "1.3.4"
      CURRENT_PROJECT_VERSION: "25"
    sources: [SubByAudiocraft]
    dependencies:
      - package: WhisperKit
    info:
      path: SubByAudiocraft/Info.plist
      properties:
        UIAppFonts:
          - Anton-Regular.ttf
          - Bangers-Regular.ttf
          - BebasNeue-Regular.ttf
          - Lato-Bold.ttf
          - Pacifico-Regular.ttf
          - PermanentMarker-Regular.ttf
          - Poppins-Bold.ttf
          - Lobster-Regular.ttf
          - Creepster-Regular.ttf
          - AbrilFatface-Regular.ttf
          - AlfaSlabOne-Regular.ttf
          - Righteous-Regular.ttf
          - FrancoisOne-Regular.ttf
          - Shrikhand-Regular.ttf
          - BlackOpsOne-Regular.ttf
        UILaunchScreen: {}
        CFBundleIconName: AppIcon
        CFBundleDisplayName: Sub by Audiocraft
        CFBundleShortVersionString: "1.3.4"
        CFBundleVersion: "25"
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: "Videolarınızı işleyebilmek için fotoğraf galerinize erişmemiz gerekiyor."
        NSPhotoLibraryAddUsageDescription: "Oluşturulan altyazılı videoyu galerinize kaydetmek için izin gerekiyor."
        # Uygulama kamera/mikrofon KULLANMAZ; FFmpeg kütüphanesi bu API'lere referans
        # verdiği için Apple bu açıklama metinlerini zorunlu tutuyor (ITMS-90683).
        NSCameraUsageDescription: "Uygulama kamerayı kullanmaz. Bu izin metni, video işleme motorunun (FFmpeg) sistem gereksinimleri nedeniyle bulunmaktadır."
        NSMicrophoneUsageDescription: "Uygulama mikrofonu kullanmaz. Bu izin metni, video işleme motorunun (FFmpeg) sistem gereksinimleri nedeniyle bulunmaktadır."
